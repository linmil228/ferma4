<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ferma</title>
    <link rel="stylesheet" href="stylesheets/style.css" />
    <script src="js/events-board.js" defer></script>
</head>

<body>
    <nav>
        <a href="./index.html" class="clickable">
            <img src="assets/img/logo.svg" alt="ferma">
        </a>
        <div class="nav-sections">
            <a href="./about.html" class="nav-section clickable">
                <img class="default-nav" src="assets/img/about.svg">
                <img class="active-nav" src="assets/img/about-active.svg">
            </a>
            <a href="./merch.html" class="nav-section clickable">
                <img class="default-nav" src="assets/img/merch.svg">
                <img class="active-nav" src="assets/img/merch-active.svg">
            </a>
            <a href="./order.html" class="nav-section clickable">
                <img class="default-nav" src="assets/img/order.svg">
                <img class="active-nav" src="assets/img/order-active.svg">
            </a>
            <a href="./events.html" class="nav-section clickable">
                <img class="default-nav" src="assets/img/events.svg">
                <img class="active-nav" src="assets/img/events-active.svg">
            </a>
        </div>
    </nav>

    <section class="events">
        <div class="events__stage">
            <div class="events__board">
                <article class="event-card event-card--podium" data-event-id="podium">
                    <span class="event-card__date">24.04</span>
                    <p class="event-card__title">ferma-<br>подиум</p>
                </article>

                <article class="event-card event-card--festival" data-event-id="festival">
                    <span class="event-card__date">14.08</span>
                    <p class="event-card__title">фестиваль</p>
                </article>

                <article class="event-card event-card--zine">
                    <a href="https://linmil228.github.io/web-plakat2/" class="event-card__link clickable" aria-label="веб-плакат о нашем зине"></a>
                    <p class="event-card__title event-card__title--vertical event-card__title--multiline">
                        <span>веб-плакат</span>
                        <span>о нашем зине</span>
                    </p>
                </article>

                <article class="event-card event-card--lecture" data-event-id="lecture">
                    <p class="event-card__title event-card__title--vertical">лекция</p>
                    <span class="event-card__date event-card__date--vertical">18.03</span>
                </article>

                <article class="event-card event-card--masterclass" data-event-id="masterclass">
                    <span class="event-card__date">29.05</span>
                    <p class="event-card__title">мастер-класс идеального салата</p>
                </article>

                <article class="event-card event-card--poster">
                    <a href="https://linmil228.github.io/FERMA/" class="event-card__link clickable" aria-label="веб-плакат" target="_blank" rel="noopener noreferrer"></a>
                    <p class="event-card__title">веб-плакат</p>
                </article>
            </div>
        </div>
    </section>

    <footer>
        <div class="left-footer">
            <div class="contacts">
                <img src="assets/img/logo-footer.svg">
                <p>+7 912 345 67 89</p>
            </div>
            <img src="assets/img/barcode-footer.png">
        </div>
        <div class="right-footer">
            <div class="footer-links">
                <a href="./about.html">о нас</a>
                <a href="./merch.html">мерч</a>
                <a href="./order.html">сборка</a>
                <a href="./events.html">события</a>
            </div>
            <div class="name">
                <p>Курпаяниди Эллина</p>
                <p>БРИЦП252</p>
            </div>
        </div>
    </footer>

</body>

</html>
